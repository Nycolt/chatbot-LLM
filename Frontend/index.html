<!DOCTYPE html>
<html lang="es">

  <head>

    <!-- Metadatos -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Debe coincidir con PORT en Backend/.env (ej. 8000 → http://localhost:8000/api/v1) -->
    <meta name="api-base" content="http://localhost:8000/api/v1" />

    <!-- Favicon -->
    <link rel="apple-touch-icon" sizes="180x180" href="src/img/lib/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="src/img/lib/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="src/img/lib/favicon-16x16.png">
    <link rel="manifest" href="src/img/lib/site.webmanifest">
    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Estilos personalizados -->
    <link rel="stylesheet" href="src/style/style.css">
    <link rel="stylesheet" href="src/style/form.css">
    <link rel="stylesheet" href="src/style/compare-table.css">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="src/style/chat-theme.css" />

    <!-- Titulo pestaña -->
    <title>Chatbot Fortinet</title>

  </head>

  <body class="fortinet-app-body fortinet-app-shell min-h-screen flex flex-col items-center justify-center">

    <!-- Contenedor principal -->
    <div
      class="fortinet-chat-card w-full flex flex-col overflow-hidden border-0">

      <!-- Header con logos -->
      <header class="fortinet-chat-header shrink-0">

        <div class="fortinet-logo-badge shrink-0">
          <div id="logo-fortinet" class="fortinet-logo-img contenedor_imagen_header" role="img" aria-label="Fortinet"></div>
        </div>

        <div class="fortinet-chat-title flex-1 min-w-0">
          <h1 class="fortinet-chat-heading text-gray-100 text-center font-bold">
            Asistente <span class="text-red-600">Fortinet</span>
          </h1>
        </div>

        <div class="fortinet-logo-badge shrink-0">
          <div id="logo-wexler" class="fortinet-logo-img contenedor_imagen_header" role="img" aria-label="Wexler"></div>
        </div>

      </header>

      <!-- Área del chat -->
      <div id="chatbox" class="fortinet-chatbox flex-1 overflow-y-auto text-sm text-gray-100 min-h-0">
        <!-- Mensaje inicial como si fuera del chatbot -->
        <div class="text-left">
          <div
            class="fortinet-welcome-bubble inline-block bg-gray-800 text-gray-200 px-4 py-3 rounded-2xl border border-red-600/50 shadow-md chat-bubble-agent">
            👋 ¡Hola! Soy tu asesor de productos <strong>Fortinet</strong>.
            Estoy aquí para ayudarte con soluciones de seguridad y tecnología. ¿Qué deseas consultar hoy?
          </div>
        </div>
      </div>

      <!-- Entrada de texto -->
      <form id="chat-form" class="fortinet-chat-form flex flex-row items-stretch gap-2 sm:gap-3">
        <textarea id="user-input" placeholder="Escribe tu mensaje aquí…" rows="2"
          class="fortinet-chat-input flex-1 resize-none focus:outline-none"></textarea>
        <button type="submit"
          class="fortinet-chat-send shrink-0 self-center">
          Enviar
        </button>
      </form>

    </div>

    <!-- PopUp - Carga de documentos -->
    <button id="settings-btn" aria-label="Configuración" title="Configuración" type="button"
      class="fortinet-settings-fab bg-black rounded-full w-16 h-16 text-white text-3xl font-bold shadow-lg hover:bg-slate-800 transition flex items-center justify-center">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-8 h-8 mx-auto">
        <path d="M12 15.5A3.5 3.5 0 1 0 12 8.5a3.5 3.5 0 0 0 0 7z"></path>
        <path d="M19.43 12.98a7.5 7.5 0 0 0 0-1.96l2.11-1.65a.5.5 0 0 0 .12-.64l-2-3.46a.5.5 0 0 0-.6-.22l-2.49 1a7.4 7.4 0 0 0-1.7-.98l-.38-2.65A.5.5 0 0 0 12.6 1h-4a.5.5 0 0 0-.5.42l-.38 2.65a7.4 7.4 0 0 0-1.7.98l-2.49-1a.5.5 0 0 0-.6.22l-2 3.46a.5.5 0 0 0 .12.64L4.57 11a7.5 7.5 0 0 0 0 1.96l-2.11 1.65a.5.5 0 0 0-.12.64l2 3.46c.14.24.43.34.68.24l2.49-1c.52.4 1.08.73 1.7.98l.38 2.65c.06.28.29.42.5.42h4c.21 0 .44-.14.5-.42l.38-2.65c.62-.25 1.18-.58 1.7-.98l2.49 1c.25.1.54 0 .68-.24l2-3.46a.5.5 0 0 0-.12-.64l-2.11-1.65zM12 17.5A5.5 5.5 0 1 1 12 6.5a5.5 5.5 0 0 1 0 11z"/>
      </svg>
    </button>

    <!-- Librerias JS -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script> <!-- Aleras -->
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script> <!-- Procesamiento documentos Excel  -->

    <!-- Script -->
    <script src="./main.js" type="module"></script>
    
  </body>

</html>
